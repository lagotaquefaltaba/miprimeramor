<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Primer Amor</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e81e4d">

<style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #fdf5ff; }
    .logo-img { max-width: 260px; height: auto; border-radius: 20px; margin-bottom: 20px; }
    .btn { display: block; width: 100%; max-width: 400px; padding: 14px; margin: 10px auto; border-radius: 14px; color: white; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
    .btn-wa { background-color: #25d366; }
    .btn-fb { background-color: #4267B2; }
    .btn-gallery { background-color: #8a2be2; }
    
    #galeria-contenido { display: none; margin-top: 20px; }
    .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
    .gallery-grid img { width: 100%; border-radius: 10px; }

    /* ESTE ES EL BLOQUE QUE FUNCIONA */
    .reproductor-caja { padding: 20px; margin-top: 20px; }
    .reproductor-caja div.cstrEmbed { width: 100% !important; min-height: 40px !important; }

    .aviso-fb { background: #ffcc00; color: #000; padding: 15px; border-radius: 15px; margin-top: 25px; font-weight: bold; font-size: 14px; }
    
    .boton-instalar { display:none; position:fixed; bottom:15px; left:50%; transform:translateX(-50%); background:#e81e4d; color:#fff; border:none; padding:15px 35px; font-size:15px; font-weight:bold; border-radius:50px; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.3); z-index:9999; }
</style>
</head>
<body>

    <img src="https://i.imgur.com/xfo0NXF.jpeg" class="logo-img" alt="Logo">
    
    <a href="https://wa.me/5493462388789" class="btn btn-wa">Contacto WhatsApp</a>
    <a href="https://www.facebook.com/share/1DrzWW31kQ/" class="btn btn-fb">Seguinos en Facebook</a>
    
    <button class="btn btn-gallery" onclick="toggleGallery()">Ver Galería de Productos</button>

    <div id="galeria-contenido">
        <div class="gallery-grid">
            <img src="https://i.imgur.com/JjVWQGz.jpeg" alt="P">
            <img src="https://i.imgur.com/XIMM3lz.jpeg" alt="P">
            <img src="https://i.imgur.com/MWwoRIa.jpeg" alt="P">
            <img src="https://i.imgur.com/X3t9UML.jpeg" alt="P">
            <img src="https://i.imgur.com/ip6u1nV.jpeg" alt="P">
            <img src="https://i.imgur.com/Wk7Masa.jpeg" alt="P">
            <img src="https://i.imgur.com/eYjasC2.jpeg" alt="P">
            <img src="https://i.imgur.com/FWhbbEA.jpeg" alt="P">
            <img src="https://i.imgur.com/2DCEGp7.jpeg" alt="P">
            <img src="https://i.imgur.com/EI2934y.jpeg" alt="P">
            <img src="https://i.imgur.com/Vj0gQ4C.jpeg" alt="P">
            <img src="https://i.imgur.com/AIt7SM3.jpeg" alt="P">
            <img src="https://i.imgur.com/NHum7hD.jpeg" alt="P">
            <img src="https://i.imgur.com/kQKEE7h.jpeg" alt="P">
            <img src="https://i.imgur.com/7v20lm8.jpeg" alt="P">
        </div>
    </div>

    <div class="reproductor-caja">
        <div data-type="newStreamPlayer" data-publicToken="4b88f7ad-1fbc-4827-adbb-ba6d98a799c3" data-theme="dark" data-color="e81e4d" data-channelId="" data-rendered="false" class="cstrEmbed">
            <a href="https://www.caster.fm">Shoutcast Hosting</a> 
            <a href="https://www.caster.fm">Stream Hosting</a> 
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>
        <script src="https://cdn.cloud.caster.fm/widgets/embed.js"></script>
    </div>

    <div class="aviso-fb">
        📱 Si estás en Facebook: Tocá los 3 puntitos arriba y elegí <b>"Abrir en navegador"</b>.
    </div>

    <button id="botonInstalar" class="boton-instalar">📲 INSTALAR APP</button>

    <script>
        function toggleGallery() {
            var x = document.getElementById("galeria-contenido");
            x.style.display = (x.style.display === "block") ? "none" : "block";
        }

        // Lógica del botón instalar
        let eventoInstalar;
        const botonInstalar = document.getElementById('botonInstalar');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            eventoInstalar = e;
            botonInstalar.style.display = 'block';
        });
        botonInstalar.addEventListener('click', () => {
            if (eventoInstalar) {
                eventoInstalar.prompt();
                eventoInstalar = null;
                botonInstalar.style.display = 'none';
            }
        });
    </script>
</body>
</html>
