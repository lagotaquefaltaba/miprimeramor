<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Primer Amor - Ropa y Accesorios para Bebés</title>

<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // Registro adaptado para GitHub Pages usando ruta relativa con punto '.'
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script>

<meta name="theme-color" content="#B497D6">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#fdfbff;padding:10px;padding-bottom:90px;}
.contenedor{max-width:450px;margin:auto;background:linear-gradient(180deg,#fdfbff,#f3eefc,#fdfbff);border-radius:24px;padding:20px;color:#4a3b5c;box-shadow:0 0 25px rgba(180,151,214,0.2);border:1px solid rgba(180,151,214,0.3);}

/* LOGO */
.logo{width:140px;height:140px;margin:auto;border-radius:50%;overflow:hidden;border:4px solid #B497D6;position:relative;margin-bottom:15px;}
.logo img{width:100%;height:100%;object-fit:cover}

h1{text-align:center;color:#9067c6;margin:15px 0;font-size:22px;}
.texto{text-align:center;color:#7a6799;margin-bottom:20px;font-size:14px;font-style:italic;}

/* 🔗 BOTONES */
.boton{display:block;text-decoration:none;color:#fff;font-weight:bold;padding:14px;border-radius:14px;text-align:center;margin:10px 0;transition:transform 0.2s;}
.boton:active { transform: scale(0.98); }
.wp1{background:#25D366}
.fb{background:#1877F2}

/* ℹ️ TEXTO AYUDA */
.texto-ayuda {
    margin-top: 18px;
    padding: 16px;
    border-radius:16px;
    background: rgba(255,255,255,0.8);
    border:1px solid rgba(180,151,214,0.3);
    font-size:13px;
    line-height: 1.8;
    color: #7a6799;
    text-align: center;
    font-weight: 500;
}

/* 🟡 BOTÓN FLOTANTE IDÉNTICO AL DE LA RADIO 🟡 */
.boton-instalar-nuevo {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    background-color: #f4c542;
    color: #000000;
    font-weight: bold;
    font-size: 15px;
    padding: 12px 25px;
    border-radius: 25px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
    z-index: 9999;
    cursor: pointer;
    border: none;
    text-transform: uppercase;
}
</style>
</head>
<body>
<div class="contenedor">

    <div class="logo">
        <img src="imagenes/logo-principal.jpg" alt="Mi Primer Amor">
    </div>

    <h1>MI PRIMER AMOR</h1>
    <p class="texto">Ropa y accesorios para bebés • Venado Tuerto</p>

    <a class="boton wp1" href="https://wa.me/5493462388789" target="_blank">WhatsApp Comercial</a>
    <a class="boton fb" href="https://www.facebook.com/share/1DrzWW31kQ/" target="_blank">Seguinos en Facebook</a>

    <div class="texto-ayuda">
        📱 Si estás entrando desde Facebook 👉 tocá los 3 puntitos de arriba y elegí "Abrir en navegador"<br>
        👆 Si no te sale: andá a 3 puntitos → <b>"Agregar a pantalla de inicio"</b> 📲
    </div>

</div>

<button id="botonInstalar" class="boton-instalar-nuevo">📲 INSTALAR MI PRIMER AMOR</button>

<script>
// Lógica idéntica de la radio para el botón instalar
let eventoInstalar;
const botonInstalar = document.getElementById('botonInstalar');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    eventoInstalar = e;
    botonInstalar.style.display = 'block';
});

botonInstalar.addEventListener('click', async () => {
    if (!eventoInstalar) {
        alert('👉 Copiá el link y abrilo en Google Chrome. Después tocá los 3 puntitos y elegí: "Agregar a pantalla de inicio".');
        return;
    }
    eventoInstalar.prompt();
    const resultado = await eventoInstalar.userChoice;
    if (resultado.outcome === 'accepted') {
        botonInstalar.style.display = 'none';
    }
    eventoInstalar = null;
});
</script>
</body>
</html>
